name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Format
            command: zig fmt --check build.zig build.zig.zon src tests fuzz
          - name: Compile targets
            command: zig build compile-check
          - name: Lint
            command: zig build lint
          - name: Unit tests
            command: zig build test
          - name: Conformance
            command: zig build conformance

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.16.0
          cache-key: ${{ matrix.name }}

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
